name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── Build static Linux binaries ────────────────────────────────────────────
  build-linux:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            archive: pulse-x86_64-linux.tar.gz
          - target: aarch64-unknown-linux-musl
            archive: pulse-aarch64-linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross-compiled static musl)
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          BIN="target/${{ matrix.target }}/release/pulse"
          strip "$BIN" 2>/dev/null || true
          tar -czf "${{ matrix.archive }}" -C "$(dirname $BIN)" pulse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Build Snap ──────────────────────────────────────────────────────────────
  build-snap:
    name: Build Snap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-linux, build-snap]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.snap" \) \
            -exec sha256sum {} \; | sed 's|\./[^/]*/||' | tee SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "pulse ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.snap
            artifacts/SHA256SUMS

  # ── Publish Snap to Snap Store ──────────────────────────────────────────────
  # Uncomment after running: snapcraft login && snapcraft export-login snap-store.env
  # then add the file contents as a GitHub secret named SNAPCRAFT_STORE_CREDENTIALS.
